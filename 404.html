<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soko Huru — Redirecting…</title>
<meta name="theme-color" content="#1a6b3c"/>
<!--
  GitHub Pages SPA Redirect Trick
  ─────────────────────────────────
  GitHub Pages serves this 404.html for any path that doesn't exist as a file.
  We grab the full URL, encode it as a query param, and redirect to index.html.
  The index.html then decodes it and restores the correct route + deep link.

  Based on: https://github.com/rafgraph/spa-github-pages
-->
<script>
  var seg = 1; // number of path segments to preserve (1 = repo root on github.io)
  var l = window.location;
  // Build redirect URL
  var redirect = l.protocol + '//' + l.hostname +
    (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
    l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g,'~and~') +
    (l.search ? '&q=' + l.search.slice(1).replace(/&/g,'~and~') : '') +
    l.hash;
  l.replace(redirect);
</script>
<style>
  body{font-family:system-ui,sans-serif;background:#fdf8f0;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
  .wrap{text-align:center;color:#1a6b3c;}
  .logo{font-size:48px;margin-bottom:12px;}
  p{font-size:13px;color:#888;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🛒</div>
    <p>Redirecting to Soko Huru…</p>
  </div>
</body>
</html>
