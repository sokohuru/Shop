<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3c"/>
      <stop offset="100%" style="stop-color:#2d9158"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8930a"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Shopping basket body -->
  <rect x="136" y="220" width="240" height="150" rx="20" ry="20" fill="#fdf8f0"/>

  <!-- Basket weave lines -->
  <line x1="196" y1="220" x2="196" y2="370" stroke="#e8ddd0" stroke-width="2"/>
  <line x1="256" y1="220" x2="256" y2="370" stroke="#e8ddd0" stroke-width="2"/>
  <line x1="316" y1="220" x2="316" y2="370" stroke="#e8ddd0" stroke-width="2"/>
  <line x1="136" y1="280" x2="376" y2="280" stroke="#e8ddd0" stroke-width="2"/>
  <line x1="136" y1="325" x2="376" y2="325" stroke="#e8ddd0" stroke-width="2"/>

  <!-- Handle arc -->
  <path d="M 186 220 Q 186 148 256 148 Q 326 148 326 220"
        fill="none" stroke="#fdf8f0" stroke-width="22" stroke-linecap="round"/>

  <!-- Amber accent stripe on basket -->
  <rect x="136" y="220" width="240" height="28" rx="0" ry="0" fill="url(#accent)" opacity="0.9"/>
  <rect x="136" y="220" width="240" height="28" rx="20" ry="0"
        style="clip-path:inset(0 0 14px 0)" fill="url(#accent)" opacity="0.9"/>

  <!-- Three product dots inside basket -->
  <circle cx="196" cy="318" r="18" fill="#e8930a"/>
  <circle cx="256" cy="308" r="22" fill="#1a6b3c" opacity="0.85"/>
  <circle cx="316" cy="318" r="18" fill="#e8930a" opacity="0.8"/>

  <!-- "SH" monogram on middle dot -->
  <text x="256" y="316" text-anchor="middle" dominant-baseline="middle"
        font-family="'Josefin Sans',Arial,sans-serif" font-size="20" font-weight="700"
        fill="#fdf8f0" letter-spacing="1">SH</text>
</svg>
